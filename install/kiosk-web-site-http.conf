# Volunteer web manager — HTTP (no TLS).
#
# Installed to /etc/nginx/kiosk-web-site.d/site.conf by kiosk-web-setup.sh (and
# seeded by deploy.sh for existing installs). Once you have a domain, run
# install/kiosk-web-tls-setup.sh to replace this with an HTTPS + redirect
# variant. Auth is the app's ?token=; the token is kept out of the access log
# by the kiosk_redacted format defined in nginx.conf.
server {
    listen 80;
    client_max_body_size 15M;
    access_log /var/log/nginx/access.log kiosk_redacted;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
