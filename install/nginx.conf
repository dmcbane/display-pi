user www-data;
# ONE worker, on purpose: nginx-rtmp keeps stream state per worker and does
# not share it. With multiple workers the ATEM's publish session lands on one
# worker while mpv subscriptions and /stat queries land on random others —
# playback becomes a retry lottery and /stat usually reports no publisher.
# A single worker easily handles one RTMP stream + the proxied web manager.
worker_processes 1;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # When publisher disconnects, drop subscribers so mpv sees EOF
            # and the player loop returns to splash.
            idle_streams off;

            # If publisher's connection is alive but silent for 10s (e.g.
            # ATEM froze mid-stream), drop it — combined with idle_streams
            # off above, this cascades to dropping subscribers.
            drop_idle_publisher 10s;

            # Publish is restricted to the wired 192.168.0.0/24 the ATEM
            # encoder lives on. The stream key is NOT a secret (it's shown on
            # the status board and lives in /etc/default/kiosk), so this CIDR
            # is the actual control that stops any other LAN host from pushing
            # video onto the worship display. The Pi's network is wired-only.
            allow publish 192.168.0.0/24;
            deny publish all;

            allow play 127.0.0.1;
            deny play all;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
    gzip on;

    # Access-log format that omits the query string, so the volunteer manager's
    # ?token= bearer credential is never written to disk. Referenced by the
    # web-manager site blocks below (both HTTP and TLS variants).
    log_format kiosk_redacted '$remote_addr - $remote_user [$time_local] '
                              '"$request_method $uri" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent"';

    # rtmp_stat — XML dump of active publishers/streams. Localhost-only.
    # Lets diagnostics/judder.sh probe surface the real stream key when a
    # publisher is connected to nginx but not to the key the player expects.
    server {
        listen 127.0.0.1:8080;
        server_name localhost;

        location /stat {
            rtmp_stat all;
            allow 127.0.0.1;
            deny all;
        }
    }

    # Volunteer web manager site block(s). Kept out of this file so TLS config
    # survives `deploy.sh` overwriting nginx.conf: kiosk-web-setup.sh installs
    # the HTTP variant here and kiosk-web-tls-setup.sh replaces it with an
    # HTTPS + redirect variant. The wildcard tolerates an empty/absent dir, so
    # RTMP-only Pis without the web manager still start cleanly.
    include /etc/nginx/kiosk-web-site.d/*.conf;
}
