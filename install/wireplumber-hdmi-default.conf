# wireplumber-hdmi-default.conf — Option B reference: pin HDMI as default sink
#
# This file is NOT auto-installed by setup-kiosk.sh. It exists as an escape
# hatch in case we ever switch from "mpv talks directly to ALSA" (option A,
# the active fix) back to "mpv goes through PipeWire and PipeWire routes to
# the right sink" (option B).
#
# See docs/journal/2026-04-25-hdmi-audio-routing.md for the full design.
#
# How to activate (manual):
#   sudo install -o kiosk -g kiosk -m 644 \
#     install/wireplumber-hdmi-default.conf \
#     /home/kiosk/.config/wireplumber/wireplumber.conf.d/50-hdmi-default.conf
#   sudo -u kiosk XDG_RUNTIME_DIR=/run/user/$(id -u kiosk) \
#     systemctl --user restart wireplumber
#
# Verify the default sink afterward:
#   sudo -u kiosk XDG_RUNTIME_DIR=/run/user/$(id -u kiosk) wpctl status \
#     | grep -A4 'Sinks:'
# The line marked with `*` should be the HDMI sink.
#
# Why match by node.name and not numeric ID:
#   PipeWire node IDs are assigned in module-load order and shift across
#   reboots. node.name is derived from the ALSA card and is stable.
#
# Why a regex match:
#   The platform address ("fef00700" on Pi 4) varies across Raspberry Pi
#   models. The "~" prefix tells WirePlumber to treat the value as a regex.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.platform-.*\\.hdmi\\.hdmi-stereo" }
    ]
    actions = {
      update-props = {
        # WirePlumber picks the highest-priority sink as default.
        # Built-in sinks usually sit at 1000-2000; 5000 wins decisively.
        priority.session = 5000
        priority.driver  = 5000
      }
    }
  }
]
